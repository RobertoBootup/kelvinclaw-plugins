name: Publish First-Party Package

on:
    workflow_dispatch:
        inputs:
            plugin_id:
                description: Plugin id to refresh and publish
                required: true
                type: choice
                default: kelvin.cli
                options:
                    - kelvin.cli
                    - kelvin.openai
                    - kelvin.anthropic
                    - kelvin.openrouter
            version:
                description: Version to refresh
                required: true
                type: string
                default: 0.1.1
            push_changes:
                description: Commit the refreshed package metadata to an automation branch and open a pull request
                required: true
                type: boolean
                default: false

permissions:
    contents: write
    id-token: write
    pull-requests: write

concurrency:
    group: publish-${{ inputs.plugin_id }}-${{ inputs.version }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish:
        name: Publish ${{ inputs.plugin_id }}@${{ inputs.version }}
        runs-on: blacksmith-2vcpu-ubuntu-2404
        timeout-minutes: 20
        env:
            AWS_REGION: us-east-1
            AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
            KMS_KEY_ID: ${{ vars.KMS_KEY_ID }}
            PUBLISHER_ID: kelvin_firstparty_aws_v1
        steps:
            - name: Checkout
              uses: useblacksmith/checkout@41cdeedae8edb2e684ba22896a5fd2a3cb85db6b
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
              with:
                  role-to-assume: ${{ env.AWS_ROLE_ARN }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Refresh package signature and index metadata
              run: |
                  scripts/refresh-first-party-package.sh \
                    --plugin-id "${{ inputs.plugin_id }}" \
                    --version "${{ inputs.version }}" \
                    --kms-key-id "${KMS_KEY_ID}" \
                    --kms-region "${AWS_REGION}" \
                    --publisher-id "${PUBLISHER_ID}"

            - name: Validate refreshed repository state
              run: scripts/validate-repository.sh --plugin-id "${{ inputs.plugin_id }}" --version "${{ inputs.version }}"

            - name: Commit changes and open pull request
              if: ${{ inputs.push_changes }}
              env:
                  GITHUB_TOKEN: ${{ github.token }}
              run: |
                  if git diff --quiet; then
                    echo "No changes to commit."
                    exit 0
                  fi
                  branch="automation/publish-${{ inputs.plugin_id }}-${{ inputs.version }}-${{ github.run_id }}"
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
                  git checkout -b "${branch}"
                  git add index.json trusted_publishers.kelvin.json "packages/${{ inputs.plugin_id }}/${{ inputs.version }}/${{ inputs.plugin_id }}-${{ inputs.version }}.tar.gz"
                  git commit -m "Refresh ${{ inputs.plugin_id }}@${{ inputs.version }} with KMS signature"
                  git push --set-upstream origin "${branch}"
                  gh pr create \
                    --base main \
                    --head "${branch}" \
                    --title "Refresh ${{ inputs.plugin_id }}@${{ inputs.version }} with KMS signature" \
                    --body "Automated first-party package refresh from workflow run ${{ github.run_id }}."
